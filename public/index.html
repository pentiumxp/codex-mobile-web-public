<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>
    (function () {
      var allowedThemes = { system: true, dark: true, light: true };
      function readTheme() {
        try {
          var value = localStorage.getItem("codexMobileTheme") || "system";
          return allowedThemes[value] ? value : "system";
        } catch (_) {
          return "system";
        }
      }
      function effectiveTheme(theme) {
        if (theme === "dark" || theme === "light") return theme;
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      function appleStatusBarStyle(theme) {
        return effectiveTheme(theme) === "light" ? "default" : "black";
      }
      function themeColor(theme) {
        return effectiveTheme(theme) === "light" ? "#f5f7f8" : "#111315";
      }
      function writeMeta(name, content) {
        document.write('<meta name="' + name + '" content="' + content + '">');
      }
      function applyTheme(theme) {
        var safeTheme = allowedThemes[theme] ? theme : "system";
        document.documentElement.setAttribute("data-theme", safeTheme);
        var colorMeta = document.querySelector('meta[name="theme-color"]');
        if (colorMeta) colorMeta.setAttribute("content", themeColor(safeTheme));
        var statusMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (statusMeta) statusMeta.setAttribute("content", appleStatusBarStyle(safeTheme));
      }
      var initialTheme = readTheme();
      document.documentElement.setAttribute("data-theme", initialTheme);
      writeMeta("theme-color", themeColor(initialTheme));
      writeMeta("apple-mobile-web-app-status-bar-style", appleStatusBarStyle(initialTheme));
      window.codexMobileTheme = { read: readTheme, apply: applyTheme };
    }());
  </script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Codex Mobile">
  <title>Codex Mobile</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="login" class="login hidden">
    <form id="loginForm" class="login-panel">
      <div class="brand">Codex</div>
      <input id="loginKey" type="password" autocomplete="current-password" placeholder="Access key">
      <button type="submit">Open</button>
      <div id="loginError" class="error-text"></div>
    </form>
  </div>

  <div id="app" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div class="side-header">
        <div>
          <div class="app-name">Codex</div>
          <div id="connectionState" class="connection">Starting</div>
        </div>
        <div class="side-header-actions">
          <select id="fontSizeSelect" class="font-size-select" title="字体大小" aria-label="字体大小">
            <option value="small">小字</option>
            <option value="default">标准</option>
            <option value="large">大字</option>
            <option value="xlarge">特大</option>
            <option value="xxlarge">超大</option>
          </select>
          <button id="themeSettingsToggle" class="icon-button" type="button" title="Theme" aria-label="Theme" aria-expanded="false">⚙</button>
          <button id="closeMenu" class="icon-button mobile-only" type="button" title="Close menu">×</button>
        </div>
      </div>

      <div id="themeSettingsPanel" class="theme-settings hidden" aria-label="Theme settings">
        <div class="theme-settings-title">主题</div>
        <div class="theme-options" role="group" aria-label="Theme">
          <button type="button" data-theme-choice="system">跟随系统</button>
          <button type="button" data-theme-choice="dark">深色</button>
          <button type="button" data-theme-choice="light">浅色</button>
        </div>
        <div class="theme-settings-note">iOS PWA 顶部栏需重开后生效</div>
      </div>

      <button id="pushNotifications" class="push-button hidden" type="button" disabled>Notifications unavailable</button>

      <label class="field-label" for="workspaceSelect">Workspace</label>
      <select id="workspaceSelect" class="select"></select>
      <div id="workspacePath" class="workspace-path" hidden></div>

      <div class="thread-tools">
        <input id="threadSearch" class="search" type="search" placeholder="Search threads">
        <button id="refreshThreads" class="icon-button" type="button" title="Refresh">↻</button>
      </div>

      <div id="threadList" class="thread-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="openMenu" class="icon-button mobile-only" type="button" title="Menu">☰</button>
        <div class="thread-title-wrap">
          <div id="threadTitle" class="thread-title">Select a thread</div>
          <div id="threadMeta" class="thread-meta"></div>
        </div>
        <div id="turnTimer" class="turn-timer" aria-live="polite" aria-hidden="true">&#26412;&#36718; 00:00:00</div>
        <button id="interruptTurn" class="icon-button" type="button" title="Interrupt" disabled>■</button>
      </header>

      <section id="conversation" class="conversation">
        <div class="empty-state">Select a thread from the menu.</div>
      </section>

      <form id="composer" class="composer">
        <label id="attachFiles" class="icon-button composer-icon file-picker" title="Attach files" aria-label="Attach files" aria-disabled="true" tabindex="-1">
          <span aria-hidden="true">+</span>
          <input id="fileInput" class="file-input" type="file" multiple disabled>
        </label>
        <div class="composer-body">
          <div class="composer-controls">
            <label class="composer-select-wrap">
              <span>Model</span>
              <select id="modelSelect" class="composer-select" disabled></select>
            </label>
            <label class="composer-select-wrap">
              <span>Reasoning</span>
              <select id="effortSelect" class="composer-select" disabled></select>
            </label>
            <label class="composer-select-wrap permission-select-wrap">
              <span>Permission</span>
              <select id="permissionSelect" class="composer-select permission-select" disabled></select>
            </label>
            <div id="quotaUsage" class="quota-usage unknown" title="Quota remaining" aria-live="polite">-- | --</div>
          </div>
          <div id="attachmentList" class="attachment-list hidden"></div>
          <div id="messageInput" class="message-input" contenteditable="false" role="textbox" aria-multiline="true" data-placeholder="Message Codex"></div>
        </div>
        <button id="sendMessage" type="submit" disabled>Send</button>
      </form>
    </main>
  </div>

  <div id="threadActionSheet" class="thread-action-sheet hidden" role="dialog" aria-labelledby="threadActionTitle">
    <div class="thread-action-panel">
      <div id="threadActionTitle" class="thread-action-title">Session</div>
      <button class="thread-action-item" type="button" data-thread-action="rename">重命名</button>
      <button class="thread-action-item" type="button" data-thread-action="continue">压缩续接</button>
      <button class="thread-action-cancel" type="button" data-thread-action="cancel">取消</button>
    </div>
  </div>

  <div id="renameDialog" class="rename-dialog hidden" role="dialog" aria-labelledby="renameTitle">
    <form id="renameForm" class="rename-panel">
      <div id="renameTitle" class="rename-title">重命名会话</div>
      <input id="renameInput" class="rename-input" type="text" maxlength="120" autocomplete="off">
      <div class="rename-actions">
        <button id="renameCancel" class="rename-cancel" type="button">取消</button>
        <button id="renameSubmit" class="rename-submit" type="submit">保存</button>
      </div>
    </form>
  </div>

  <script src="/app.js"></script>
  <script>
    (function () {
      function ready(fn) {
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", fn);
        else fn();
      }
      ready(function () {
        try {
          var api = window.codexMobileTheme;
          var toggle = document.getElementById("themeSettingsToggle");
          var panel = document.getElementById("themeSettingsPanel");
          if (!api || !toggle || !panel) return;
          function selectedTheme() {
            return api.read ? api.read() : "system";
          }
          function renderThemeChoice() {
            var current = selectedTheme();
            panel.querySelectorAll("[data-theme-choice]").forEach(function (button) {
              var selected = button.getAttribute("data-theme-choice") === current;
              button.classList.toggle("selected", selected);
              button.setAttribute("aria-pressed", selected ? "true" : "false");
            });
          }
          toggle.addEventListener("click", function () {
            var shouldOpen = panel.classList.contains("hidden");
            renderThemeChoice();
            panel.classList.toggle("hidden", !shouldOpen);
            toggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
          });
          panel.addEventListener("click", function (event) {
            var button = event.target.closest("[data-theme-choice]");
            if (!button) return;
            var value = button.getAttribute("data-theme-choice") || "system";
            try {
              localStorage.setItem("codexMobileTheme", value);
            } catch (_) {}
            api.apply(value);
            renderThemeChoice();
          });
          if (window.matchMedia) {
            var media = window.matchMedia("(prefers-color-scheme: light)");
            var onSystemThemeChange = function () {
              if (selectedTheme() === "system") api.apply("system");
            };
            if (media.addEventListener) media.addEventListener("change", onSystemThemeChange);
            else if (media.addListener) media.addListener(onSystemThemeChange);
          }
          renderThemeChoice();
        } catch (_) {
          // Theme settings must never block the main app.
        }
      });
    }());
  </script>
</body>
</html>
